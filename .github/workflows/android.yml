name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew
        # Note: If your Android project is in a subdirectory (e.g. android-project), 
        # add "working-directory: android-project" to this and subsequent run steps.

      - name: Build Debug APK with Gradle
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Compiled Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FUDMA-Lecture-Reminder-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
